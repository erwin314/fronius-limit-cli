name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: fronius-limit-cli
            asset_name: fronius-limit-cli-linux-amd64
            use_cross: false
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact_name: fronius-limit-cli
            asset_name: fronius-limit-cli-linux-armv7
            use_cross: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            artifact_name: fronius-limit-cli
            asset_name: fronius-limit-cli-linux-musl-armv7
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: fronius-limit-cli
            asset_name: fronius-limit-cli-macos-arm64
            use_cross: false
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: fronius-limit-cli
            asset_name: fronius-limit-cli-macos-amd64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: fronius-limit-cli.exe
            asset_name: fronius-limit-cli-windows-amd64.exe
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: fronius-limit-cli
            asset_name: fronius-limit-cli-linux-arm64
            use_cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: fronius-limit-cli
            asset_name: fronius-limit-cli-linux-musl-amd64
            use_cross: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: fronius-limit-cli.exe
            asset_name: fronius-limit-cli-windows-arm64.exe
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build natively
        if: !matrix.use_cross
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: ren target\${{ matrix.target }}\release\${{ matrix.artifact_name }} ${{ matrix.asset_name }}
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
